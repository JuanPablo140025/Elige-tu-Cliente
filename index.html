<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Freelance Helper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>💼 Freelance Helper</h1>

    <label>Horas trabajadas</label>
    <input type="number" id="horas">

    <label>Tarifa por hora</label>
    <input type="number" id="tarifa">

    <label>Urgencia del pedido</label>
    <select id="urgencia">
      <option value="">Seleccione</option>
      <option value="normal">Normal</option>
      <option value="urgente">Urgente</option>
      <option value="express">Express</option>
    </select>

    <button onclick="cotizar()">Calcular</button>

    <p id="error"></p>

    <div class="resultado">
      <p id="urgenciaResultado"></p>
      <p id="subtotal"></p>
      <p id="iva"></p>
      <p id="total"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
